name: Release

# Fires whenever you push a version tag, e.g.  git tag v1.0.1 && git push origin v1.0.1
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # required to create the GitHub Release and upload assets

jobs:
  # ---------------------------------------------------------------------------
  # Android: managed Expo -> prebuild -> Gradle debug APK (no signing secrets)
  # ---------------------------------------------------------------------------
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Generate native Android project
        run: npx expo prebuild --platform android --no-install

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk Kondor.apk

      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: Kondor.apk

  # ---------------------------------------------------------------------------
  # Windows: export PWA -> wrap in Tauri -> NSIS .exe installer
  # ---------------------------------------------------------------------------
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Export web build (dist/)
        run: npm run export:web

      - name: Generate Tauri icons from app icon
        run: npx --yes @tauri-apps/cli@^2 icon assets/images/icon.png

      - name: Build Windows installer
        run: npx --yes @tauri-apps/cli@^2 build

      - name: Collect installer
        shell: bash
        run: cp src-tauri/target/release/bundle/nsis/*-setup.exe Kondor_x64-setup.exe

      - uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: Kondor_x64-setup.exe

  # ---------------------------------------------------------------------------
  # Publish: attach both artifacts to a GitHub Release for the tag
  # ---------------------------------------------------------------------------
  release:
    needs: [android, windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Kondor ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            artifacts/android-apk/Kondor.apk
            artifacts/windows-exe/Kondor_x64-setup.exe
